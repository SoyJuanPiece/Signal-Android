name: Android CI

on:
  pull_request:
  push:
    branches:
    - 'main'
    - '7.**'

permissions:
  contents: read # to fetch code (actions/checkout)

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      # gh api repos/actions/checkout/commits/v6 --jq '.sha'
      with:
          submodules: true

    - name: set up JDK 17
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
      # gh api repos/actions/setup-java/commits/v5 --jq '.sha'
      with:
        distribution: temurin
        java-version: 17
        cache: gradle

    - name: Lower Gradle Memory for CI
      run: sed -i 's/Xmx12g/Xmx4g/g' gradle.properties

    - name: Validate Gradle Wrapper
      uses: gradle/actions/wrapper-validation@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6
      # gh api repos/gradle/actions/commits/v6 --jq '.sha'


    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace --no-configuration-cache -Xinternal.repository.verification=off

    - name: Decode Keystore
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      run: echo $KEYSTORE_BASE64 | base64 -d > release.jks

    - name: Build Release APK and Bundle
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      env:
        RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
        RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
        RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
      run: ./gradlew assemblePlayProdRelease bundlePlayProdRelease --stacktrace --no-configuration-cache -Xinternal.repository.verification=off

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: Signal-Debug-APK
        path: app/build/outputs/apk/debug/*.apk

    - name: Upload Release APK
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: actions/upload-artifact@v4
      with:
        name: Signal-Release-APK
        path: app/build/outputs/apk/playProd/release/*.apk

    - name: Upload Release Bundle (AAB)
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: actions/upload-artifact@v4
      with:
        name: Signal-Release-Bundle
        path: app/build/outputs/bundle/playProdRelease/*.aab

    - name: Archive reports for failed build
      if: ${{ failure() }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      # gh api repos/actions/upload-artifact/commits/v7 --jq '.sha'
      with:
        name: reports
        path: '*/build/reports'
